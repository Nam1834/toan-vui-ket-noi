<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Đăng nhập - TOÁN VUI KẾT NỐI</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#4F8CFF; --yellow:#FFD93D; --green:#6BCB77; --orange:#FF9F43;
    --pink:#FF6B9D; --purple:#9B72FF; --white:#FFFFFF; --bg-soft:#F4F8FF;
    --text-dark:#2D3748; --text-soft:#6B7280;
    --shadow:0 8px 24px rgba(79,140,255,.15); --shadow-lg:0 16px 40px rgba(79,140,255,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka','Baloo 2',system-ui,sans-serif;color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#E8F0FF,#F4F8FF);position:relative;overflow-x:hidden}
  .bg-num{position:fixed;font-weight:800;font-size:48px;opacity:.12;animation:floaty 12s ease-in-out infinite;pointer-events:none}
  .bg-num:nth-child(1){top:12%;left:10%;color:var(--blue)}
  .bg-num:nth-child(2){top:70%;left:14%;color:var(--orange);animation-delay:2s}
  .bg-num:nth-child(3){top:24%;right:12%;color:var(--green);animation-delay:4s}
  .bg-num:nth-child(4){top:76%;right:10%;color:var(--purple);animation-delay:6s}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-26px) rotate(5deg)}}
  .login-card{background:var(--white);border-radius:30px;box-shadow:var(--shadow-lg);width:100%;max-width:430px;padding:36px 32px;text-align:center;position:relative;z-index:1}
  .logo-icon{width:76px;height:76px;margin:0 auto 14px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 8px 20px rgba(79,140,255,.4);animation:bounce 3s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .brand{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .welcome{color:var(--text-soft);font-size:15px;margin:4px 0 22px}
  .field-label{display:block;text-align:left;font-weight:700;font-size:14px;margin:0 0 8px 4px}
  .input{width:100%;padding:14px 16px;border:2px solid #E8ECF4;border-radius:15px;font-family:inherit;font-size:16px;outline:none;transition:all .2s;margin-bottom:16px}
  .input:focus{border-color:var(--blue)}
  .btn-login{width:100%;padding:15px;border:none;border-radius:16px;cursor:pointer;font-family:inherit;font-weight:700;font-size:17px;color:var(--white);background:linear-gradient(135deg,var(--green),#4DBE5C);box-shadow:0 8px 20px rgba(107,203,119,.45);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
  .btn-login:hover{transform:translateY(-3px) scale(1.02)}
  .btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .link{margin-top:18px;font-size:14px;color:var(--text-soft)}
  .link a{color:var(--blue);font-weight:700}
  .msg{font-size:13px;font-weight:600;min-height:18px;margin-bottom:10px}
  .msg.err{color:var(--pink)} .msg.ok{color:#2F8F3E}
  .banner{background:#FFF4E0;color:#8A5A12;border-radius:14px;padding:14px;font-size:13px;text-align:left;margin-bottom:16px;line-height:1.6;display:none}
  .banner.show{display:block}
  .banner code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:5px}
  .note{font-size:12px;color:var(--text-soft);margin-top:18px;line-height:1.5}
</style>
</head>
<body>
  <div class="bg-num">7</div><div class="bg-num">3</div><div class="bg-num">5</div><div class="bg-num">8</div>

  <div class="login-card">
    <div class="logo-icon">🐰</div>
    <div class="brand">TOÁN VUI KẾT NỐI</div>
    <div class="welcome">Đăng nhập để tiếp tục nhé! 🎉</div>

    <div class="banner" id="cfgBanner">
      ⚠️ <b>Chưa kết nối Supabase.</b> Hãy điền <code>SUPABASE_URL</code> + key vào <code>supabase-config.js</code> và chạy <code>supabase-schema.sql</code>.
    </div>

    <span class="field-label">Email</span>
    <input class="input" id="email" type="email" placeholder="email@cuaban.com" autocomplete="email">

    <span class="field-label">Mật khẩu</span>
    <input class="input" id="pass" type="password" placeholder="••••••" autocomplete="current-password">

    <div class="msg" id="msg"></div>
    <button class="btn-login" id="btn" onclick="doLogin()">🚀 Đăng nhập</button>

    <div class="link">Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script>
  if (!TVKN.configured) {
    document.getElementById('cfgBanner').classList.add('show');
    document.getElementById('btn').disabled = true;
  } else {
    // đã đăng nhập sẵn thì vào thẳng
    TVKN.getProfile().then(function (p) { if (p) window.location.replace(homeFor(p.role)); }).catch(function () {});
  }

  function setMsg(t, ok) { const m = document.getElementById('msg'); m.textContent = t; m.className = 'msg ' + (ok ? 'ok' : 'err'); }

  // Trang chủ theo vai trò: admin → quản trị, parent → trang phụ huynh, teacher → trang giáo viên, còn lại → app học sinh
  function homeFor(role) { return role === 'admin' ? 'admin.html' : role === 'parent' ? 'phu-huynh.html' : role === 'teacher' ? 'giao-vien.html' : 'index.html'; }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;
    if (!email) return setMsg('📧 Vui lòng nhập email.');
    if (!pass) return setMsg('🔒 Vui lòng nhập mật khẩu.');
    const btn = document.getElementById('btn');
    btn.disabled = true; setMsg('⏳ Đang đăng nhập...', true);
    try {
      await TVKN.signIn(email, pass);
      setMsg('🎉 Đăng nhập thành công!', true);
      const prof = await TVKN.getProfile();
      window.location.href = homeFor(prof && prof.role);
    } catch (err) {
      let m = err.message || 'Đăng nhập thất bại';
      if (/Invalid login/i.test(m)) m = 'Email hoặc mật khẩu chưa đúng.';
      if (/Email not confirmed/i.test(m)) m = 'Email chưa xác nhận. Vui lòng kiểm tra hộp thư, hoặc tắt "Confirm email" trong Supabase.';
      setMsg('❌ ' + m);
      btn.disabled = false;
    }
  }
  document.getElementById('pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
