<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Bài học - TOÁN VUI KẾT NỐI</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #4F8CFF; --yellow: #FFD93D; --green: #6BCB77; --orange: #FF9F43;
    --pink: #FF6B9D; --purple: #9B72FF; --white: #FFFFFF; --bg-soft: #F4F8FF;
    --text-dark: #2D3748; --text-soft: #6B7280;
    --shadow: 0 8px 24px rgba(79, 140, 255, 0.15);
    --shadow-lg: 0 16px 40px rgba(79, 140, 255, 0.22);
    --theme: #6BCB77; --theme-soft: #D4F4DD;   /* engine sẽ đổi theo lớp */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Fredoka','Baloo 2',system-ui,sans-serif; background: var(--bg-soft); color: var(--text-dark); line-height: 1.6; overflow-x: hidden; }
  a { text-decoration: none; color: inherit; }

  .header { position: sticky; top: 0; z-index: 100; height: 64px; background: var(--white); box-shadow: 0 4px 20px rgba(79,140,255,.08); display: flex; align-items: center; padding: 0 22px; gap: 16px; }
  .back-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 15px; border-radius: 12px; background: var(--bg-soft); font-weight: 700; font-size: 14px; transition: all .2s; }
  .back-btn:hover { background: var(--theme); color: var(--white); }
  .header-title { font-family: 'Baloo 2',sans-serif; font-weight: 700; font-size: 16px; text-align: center; flex: 1; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .xp-pill { display: flex; align-items: center; gap: 6px; padding: 7px 13px; background: linear-gradient(135deg,var(--yellow),var(--orange)); color: var(--white); border-radius: 12px; font-weight: 700; font-size: 14px; }
  .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg,var(--theme),var(--blue)); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 3px solid var(--white); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

  .wrap { max-width: 880px; margin: 0 auto; padding: 0 22px 60px; }

  .lesson-banner { margin-top: 26px; background: linear-gradient(135deg,var(--theme-soft),#FFFDF8); border-radius: 26px; padding: 32px 36px; display: flex; align-items: center; gap: 26px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .lesson-banner-text { flex: 1; z-index: 1; }
  .lesson-banner h1 { font-family: 'Baloo 2',sans-serif; font-size: clamp(24px,4vw,34px); font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
  .lesson-banner p { color: var(--text-soft); font-size: 16px; }
  .lesson-banner .mascot { width: 120px; height: 120px; flex-shrink: 0; background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 70px; box-shadow: 0 14px 34px rgba(0,0,0,.12); animation: bounce 3s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .steps { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 28px 0; flex-wrap: wrap; }
  .step { display: flex; align-items: center; gap: 8px; }
  .step-dot { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; background: var(--white); color: var(--text-soft); box-shadow: var(--shadow); border: 3px solid transparent; }
  .step.done .step-dot { background: var(--green); color: var(--white); }
  .step.current .step-dot { background: var(--theme); color: var(--white); transform: scale(1.08); }
  .step-label { font-size: 13px; font-weight: 600; color: var(--text-soft); }
  .step.current .step-label, .step.done .step-label { color: var(--text-dark); }
  .step-line { width: 28px; height: 3px; background: #E2E5EA; border-radius: 2px; }

  .block { background: var(--white); border-radius: 24px; padding: 30px; box-shadow: var(--shadow); margin-bottom: 22px; }
  .block-title { font-family: 'Baloo 2',sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .block-sub { color: var(--text-soft); font-size: 15px; margin-bottom: 18px; }
  .block.warmup { background: linear-gradient(135deg,#FFF8E1,#FFFDF5); }

  /* explore-tiles */
  .objects { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; font-size: 46px; padding: 16px; background: var(--bg-soft); border-radius: 18px; margin-bottom: 16px; min-height: 70px; align-items: center; letter-spacing: 2px; text-align: center; }
  .num-detail { text-align: center; padding: 16px; background: var(--bg-soft); border-radius: 16px; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .num-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .num-tile { width: 56px; height: 56px; border-radius: 14px; background: var(--theme-soft); color: var(--text-dark); font-family: 'Baloo 2',sans-serif; font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; border: none; }
  .num-tile:hover { background: var(--theme); color: var(--white); transform: translateY(-4px) scale(1.08); }
  .num-tile.active { background: var(--blue); color: var(--white); transform: scale(1.1); }

  /* build-number */
  .build-controls { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-bottom: 18px; }
  .stepper { background: var(--bg-soft); border-radius: 18px; padding: 14px 18px; text-align: center; min-width: 150px; }
  .stepper-label { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .stepper-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .stepper-btn { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--white); font-size: 22px; font-weight: 800; cursor: pointer; box-shadow: var(--shadow); transition: all .2s; color: var(--theme); }
  .stepper-btn:hover { background: var(--theme); color: var(--white); transform: translateY(-2px); }
  .stepper-val { font-family: 'Baloo 2',sans-serif; font-size: 30px; font-weight: 800; width: 44px; }
  .build-view { text-align: center; padding: 18px; background: var(--bg-soft); border-radius: 18px; }
  .sticks { font-size: 30px; min-height: 44px; letter-spacing: 2px; margin-bottom: 12px; word-break: break-word; }
  .build-num { font-family: 'Baloo 2',sans-serif; font-size: 44px; font-weight: 800; color: var(--orange); line-height: 1; }
  .build-sum { margin-top: 8px; font-size: 18px; font-weight: 600; }
  .build-read { margin-top: 4px; color: var(--text-soft); font-size: 15px; }

  /* read-cards */
  .read-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .read-card { background: var(--bg-soft); border-radius: 18px; padding: 16px 12px; text-align: center; transition: all .2s; }
  .read-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .read-num { font-family: 'Baloo 2',sans-serif; font-size: 42px; font-weight: 800; color: var(--blue); line-height: 1; }
  .read-sum { font-weight: 700; color: var(--text-dark); margin: 8px 0 4px; font-size: 17px; }
  .read-word { color: var(--text-soft); font-size: 14px; margin: 6px 0 4px; }
  .read-objs { font-size: 20px; min-height: 26px; margin-bottom: 10px; }
  .listen-btn { padding: 8px 16px; border-radius: 12px; background: var(--white); border: 2px solid #E2E5EA; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer; transition: all .2s; }
  .listen-btn:hover { background: var(--theme); color: var(--white); border-color: var(--theme); }

  /* mcq */
  .options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .opt { padding: 18px; border-radius: 16px; background: var(--white); border: 2px solid #E8ECF4; font-family: 'Baloo 2',sans-serif; font-size: 22px; font-weight: 800; cursor: pointer; transition: all .2s; text-align: center; }
  .opt:hover { border-color: var(--theme); transform: translateY(-3px); }
  .opt.correct { background: var(--green); color: var(--white); border-color: var(--green); }
  .opt.wrong { background: #FFE5E5; border-color: var(--pink); }

  .feedback { margin-top: 16px; padding: 14px 18px; border-radius: 14px; font-weight: 600; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--theme-soft); color: #2F6F3E; }
  .feedback.no { background: #FFF0E6; color: #C76A1E; }

  /* sequence */
  .seq-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; margin: 14px 0; }
  .seq-cell { width: 60px; height: 56px; border-radius: 14px; background: var(--theme-soft); color: var(--text-dark); font-family: 'Baloo 2',sans-serif; font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .seq-input { width: 60px; height: 56px; border-radius: 14px; border: 2px dashed var(--theme); background: var(--white); text-align: center; font-family: 'Baloo 2',sans-serif; font-size: 24px; font-weight: 800; color: var(--theme); outline: none; }
  .seq-input.right { border: 2px solid var(--green); background: var(--theme-soft); color: #2F8F3E; }
  .seq-input.wrongi { border: 2px solid var(--pink); background: #FFE5E5; }
  .seq-label { font-weight: 700; margin-bottom: 4px; }

  /* AI */
  .block.ai { background: linear-gradient(135deg,var(--blue),var(--purple)); color: var(--white); }
  .block.ai .block-sub { color: rgba(255,255,255,.9); }
  .ai-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .ai-bunny { width: 56px; height: 56px; background: rgba(255,255,255,.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .ai-input { display: flex; gap: 8px; background: rgba(255,255,255,.95); padding: 7px; border-radius: 16px; }
  .ai-input input { flex: 1; border: none; background: transparent; padding: 12px 14px; font-family: inherit; font-size: 15px; outline: none; color: var(--text-dark); }
  .ai-send { background: linear-gradient(135deg,var(--orange),var(--pink)); color: var(--white); border: none; padding: 12px 22px; border-radius: 12px; font-family: inherit; font-weight: 700; cursor: pointer; transition: transform .2s; }
  .ai-send:hover { transform: scale(1.05); }
  .ai-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .ai-chip { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3); color: var(--white); padding: 7px 14px; border-radius: 999px; font-size: 13px; cursor: pointer; transition: all .2s; }
  .ai-chip:hover { background: rgba(255,255,255,.35); }
  .ai-answer { margin-top: 14px; background: rgba(255,255,255,.95); color: var(--text-dark); border-radius: 16px; padding: 14px 18px; font-weight: 600; display: none; }
  .ai-answer.show { display: block; }

  .btn { display: inline-flex; align-items: center; gap: 9px; padding: 14px 28px; border-radius: 16px; font-family: inherit; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: all .25s cubic-bezier(.34,1.56,.64,1); }
  .btn-primary { background: linear-gradient(135deg,var(--theme),var(--blue)); color: var(--white); box-shadow: 0 8px 20px rgba(0,0,0,.18); }
  .btn-primary:hover { transform: translateY(-3px) scale(1.02); }
  .btn-block { width: 100%; justify-content: center; }

  .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
  .nav-btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 22px; border-radius: 14px; background: var(--white); font-weight: 700; font-size: 15px; box-shadow: var(--shadow); transition: all .2s; cursor: pointer; border: none; font-family: inherit; }
  .nav-btn:hover { transform: translateY(-2px); }
  .nav-btn.disabled { opacity: .4; pointer-events: none; }
  .nav-btn.next { background: var(--theme); color: var(--white); }

  .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 9999; border-radius: 2px; }

  @media (max-width: 560px) {
    .header-title { display: none; }
    .wrap { padding: 0 14px 50px; }
    .lesson-banner { flex-direction: column; text-align: center; padding: 26px; }
    .options { grid-template-columns: repeat(2, 1fr); }
    .read-grid { grid-template-columns: repeat(2, 1fr); }
    .step-label { display: none; }
    .step-line { width: 14px; }
  }
</style>
</head>
<body>

<header class="header">
  <a href="trang-lop.html" class="back-btn" id="backBtn">← Danh sách bài</a>
  <div class="header-title" id="hdrTitle">Bài học</div>
  <div class="header-right">
    <div class="xp-pill">🪙 <span id="xpVal" data-bind="xp">0</span></div>
    <div class="avatar" id="hdrAvatar">🐰</div>
  </div>
</header>

<div class="wrap" id="wrap">
  <!-- engine dựng nội dung tại đây -->
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/modules.js"></script>
<script src="assets/js/lessons.js"></script>
<script src="assets/js/lessons-lop1.js"></script>
<script src="assets/js/lessons-lop2.js"></script>
<script src="assets/js/lessons-lop3.js"></script>
<script src="assets/js/lessons-lop4.js"></script>
<script src="assets/js/lessons-lop5.js"></script>
<script>
  (function () {
    const U = window.TVKN_UI;
    const DATA = window.TVKN_LESSONS;
    const id = new URLSearchParams(location.search).get('id') || '';
    const L = DATA.lessons[id];
    const wrap = document.getElementById('wrap');

    if (!L) {
      wrap.innerHTML = '<div class="block" style="text-align:center;margin-top:40px">' +
        '<h2 class="block-title" style="justify-content:center">😢 Không tìm thấy bài học</h2>' +
        '<p class="block-sub">Bài học không tồn tại. Em hãy quay lại danh sách bài nhé!</p>' +
        '<a href="trang-lop.html" class="btn btn-primary btn-block">📚 Về danh sách bài</a></div>';
      return;
    }

    // Tiêu đề + chủ đề màu
    U.applyTheme(L.theme);
    document.title = 'Lớp ' + L.grade + ' · Bài ' + L.no + ': ' + L.title + ' - TOÁN VUI KẾT NỐI';
    document.getElementById('hdrTitle').textContent = 'Lớp ' + L.grade + ' · Bài ' + L.no + ': ' + L.title;
    if (L.avatar) document.getElementById('hdrAvatar').textContent = L.avatar;

    // ---- Banner + thanh bước ----
    let html = `<div class="lesson-banner">
        <div class="lesson-banner-text">
          <h1>Bài ${L.no}: ${L.title}</h1>
          <p>${L.banner || ''}</p>
        </div>
        <div class="mascot">${L.mascot || '🐰'}</div>
      </div>`;

    if (L.steps && L.steps.length) {
      html += '<div class="steps">' + L.steps.map((s, i) =>
        `${i ? '<div class="step-line"></div>' : ''}<div class="step ${i === 0 ? 'current' : ''}"><div class="step-dot">${i + 1}</div><span class="step-label">${s}</span></div>`
      ).join('') + '</div>';
    }

    // ---- Các khối module ----
    const inits = [];
    (L.blocks || []).forEach((block, i) => {
      const m = window.TVKN_MODULES.render(block, 'b' + i);
      html += m.html;
      if (m.init) inits.push(m.init);
    });

    // ---- Khối AI Thỏ Toán ----
    if (L.ai) {
      const chips = (L.ai.chips || []).map(c => `<span class="ai-chip">${U.esc(c.q)}</span>`).join('');
      html += `<div class="block ai">
        <div class="ai-head">
          <div class="ai-bunny">🐰</div>
          <div>
            <h2 class="block-title" style="color:#fff;margin:0">Hỏi Thỏ Toán</h2>
            <p class="block-sub" style="margin:0">Em chưa hiểu chỗ nào? Hỏi Thỏ Toán nhé!</p>
          </div>
        </div>
        <div class="ai-input">
          <input type="text" id="aiInput" placeholder="Nhập câu hỏi của em...">
          <button class="ai-send" id="aiSend">💬 Hỏi</button>
        </div>
        <div class="ai-chips" id="aiChips">${chips}</div>
        <div class="ai-answer" id="aiAnswer"></div>
      </div>`;
    }

    // ---- CTA luyện tập ----
    html += `<div class="block" style="text-align:center;background:linear-gradient(135deg,#FFF8E1,#FFFDF5)">
        <h2 class="block-title" style="justify-content:center">🎯 Sẵn sàng luyện tập chưa?</h2>
        <p class="block-sub">Làm bài luyện tập để nhận <b>+30 XP</b> và ghi nhận tiến độ nhé!</p>
        <a href="lam-bai-tap.html?lesson=${encodeURIComponent(id)}" class="btn btn-primary btn-block">Bắt đầu luyện tập →</a>
      </div>`;

    // ---- Điều hướng bài trước / sau (thứ tự suy từ grade + no) ----
    const order = Object.keys(DATA.lessons)
      .filter(k => DATA.lessons[k].grade === L.grade)
      .sort((a, b) => (DATA.lessons[a].no || 0) - (DATA.lessons[b].no || 0));
    const pos = order.indexOf(id);
    const prevId = pos > 0 ? order[pos - 1] : null;
    const nextId = (pos >= 0 && pos < order.length - 1) ? order[pos + 1] : null;
    function navBtn(target, label, cls) {
      if (target && DATA.lessons[target]) return `<a href="hoc-bai.html?id=${encodeURIComponent(target)}" class="nav-btn ${cls}">${label}</a>`;
      if (target) return `<a href="${U.esc(target)}.html" class="nav-btn ${cls}">${label}</a>`; // bài cũ chưa chuyển sang engine
      return `<button class="nav-btn disabled ${cls}">${label}</button>`;
    }
    html += `<div class="nav-row">
        ${navBtn(prevId, '← Bài trước', '')}
        <a href="trang-lop.html" class="nav-btn">📚 Danh sách bài</a>
        ${navBtn(nextId, 'Bài tiếp theo →', 'next')}
      </div>`;

    wrap.innerHTML = html;

    // ---- Gắn tương tác cho từng module ----
    inits.forEach(fn => { try { fn(wrap); } catch (e) { console.warn('init module lỗi:', e); } });

    // ---- AI Thỏ Toán ----
    if (L.ai) {
      const map = {};
      (L.ai.chips || []).forEach(c => { map[c.q.trim().toLowerCase()] = c.a; });
      const input = document.getElementById('aiInput');
      const answer = document.getElementById('aiAnswer');
      function show(q) {
        const key = (q || '').trim().toLowerCase();
        answer.textContent = map[key] || ((L.ai.fallback || 'Thỏ Toán đang suy nghĩ...') + ' (Em hỏi: "' + q + '")');
        answer.className = 'ai-answer show';
      }
      document.getElementById('aiSend').addEventListener('click', e => {
        if (!input.value.trim()) { input.focus(); return; }
        show(input.value); U.celebrate(e);
      });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (input.value.trim()) { show(input.value); U.celebrate(); } } });
      document.getElementById('aiChips').addEventListener('click', e => {
        const chip = e.target.closest('.ai-chip'); if (!chip) return;
        input.value = chip.textContent; show(chip.textContent);
      });
    }

    // ---- Chặn đăng nhập + đồng bộ hồ sơ thật (Supabase) ----
    // Bài học thử (TRIAL): khách xem được, không bắt buộc login (giữ đúng hành vi trang chủ "Học thử miễn phí").
    // Các bài còn lại: bắt buộc đăng nhập.
    const TRIAL_IDS = (L.trial || ['bai-1']);   // mặc định Bài 1 Lớp 1 là bài học thử
    const isTrial = (typeof L.trial === 'boolean') ? L.trial : (TRIAL_IDS.indexOf(id) >= 0);
    if (window.TVKN) {
      window.tvknLogout = function () { TVKN.signOut(); };
      if (isTrial && TVKN.trialPage) {
        TVKN.trialPage().then(function (data) {
          if (!data) {
            // Khách học thử: nút "Danh sách bài" cần đăng nhập → đổi về Trang chủ
            document.querySelectorAll('a[href="trang-lop.html"]').forEach(function (a) {
              a.setAttribute('href', 'index.html');
              a.textContent = a.textContent.replace('Danh sách bài', 'Trang chủ');
            });
          }
        }).catch(function () {});
      } else {
        TVKN.guardPage();   // chưa đăng nhập → tự chuyển về trang đăng nhập
      }
    }
  })();
</script>
</body>
</html>
